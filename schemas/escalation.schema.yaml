$schema: "https://json-schema.org/draft/2020-12/schema"
title: "Escalation Request"
type: object
required:
  - schema_version
  - request_id
  - type
  - reason
  - fields_needed
properties:
  schema_version:
    type: string
  request_id:
    type: string
  type:
    type: string
    enum: [ssh_connection, file_path, api_token, permission, custom]
  reason:
    type: string
  fields_needed:
    type: array
    items:
      type: string
  urgency:
    type: string
    enum: [blocking, normal, low]
additionalProperties: true
