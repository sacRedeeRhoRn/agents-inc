type: object
required:
  - schema_version
  - project_id
  - thread_id
  - status
  - updated_at
properties:
  schema_version:
    type: string
  project_id:
    type: string
  thread_id:
    type: string
  status:
    type: string
    enum: [active, inactive]
  last_turn_id:
    type: string
  last_saved_checkpoint_id:
    type: string
  last_saved_at:
    type: string
  last_auto_resume_checkpoint_id:
    type: string
  last_auto_resume_status:
    type: string
  last_auto_resume_at:
    type: string
  pending_orchestration:
    type: object
  chat_log_path:
    type: string
  prefix:
    type: string
  updated_at:
    type: string
