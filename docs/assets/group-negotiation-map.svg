<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="560" viewBox="0 0 1080 560" role="img" aria-labelledby="title desc">
  <title id="title">group negotiation map</title>
  <desc id="desc">Groups converge into a head meeting and return refined actions.</desc>
  <defs>
    <style>
      .bg { fill: #f7f1e8; }
      .n { fill: #fff9ef; stroke: #2f2a24; stroke-width: 2.5; rx: 18; }
      .c { fill: #f9e2c7; stroke: #8f5b2e; stroke-width: 3; rx: 20; }
      .l { stroke: #2f2a24; stroke-width: 2.5; fill: none; marker-end: url(#m); }
      .t { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #2f2a24; text-anchor: middle; }
      .s { font: 600 14px 'Segoe UI', Arial, sans-serif; fill: #6a5f53; text-anchor: middle; }
    </style>
    <marker id="m" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto">
      <polygon points="0,0 12,4 0,8" fill="#2f2a24" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1080" height="560" />

  <rect class="n" x="80" y="90" width="220" height="78" />
  <text class="t" x="190" y="136">developer</text>

  <rect class="n" x="780" y="90" width="220" height="78" />
  <text class="t" x="890" y="136">quality</text>

  <rect class="n" x="80" y="390" width="220" height="78" />
  <text class="t" x="190" y="436">literature</text>

  <rect class="n" x="780" y="390" width="220" height="78" />
  <text class="t" x="890" y="436">integration</text>

  <rect class="c" x="430" y="230" width="220" height="100" />
  <text class="t" x="540" y="276">meeting</text>
  <text class="s" x="540" y="301">head loop</text>

  <path class="l" d="M300 129 H430" />
  <path class="l" d="M780 129 H650" />
  <path class="l" d="M300 429 H430" />
  <path class="l" d="M780 429 H650" />

  <path class="l" d="M430 256 C320 236, 275 198, 230 170" />
  <path class="l" d="M650 256 C760 236, 805 198, 850 170" />
  <path class="l" d="M430 304 C320 324, 275 362, 230 390" />
  <path class="l" d="M650 304 C760 324, 805 362, 850 390" />
</svg>
